name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=0
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Le secret GitHub CLOUDFLARE_API_TOKEN est vide ou absent. Ajoutez-le dans Settings > Secrets and variables > Actions > Repository secrets."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Le secret GitHub CLOUDFLARE_ACCOUNT_ID est vide ou absent. Ajoutez-le dans Settings > Secrets and variables > Actions > Repository secrets."
            missing=1
          fi
          exit $missing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy . --project-name=terrasync --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
