[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/admin"
  to = "/"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/tool"
  to = "/tool.html"
  status = 200

[[redirects]]
  from = "/tool.html"
  to = "/tool.html"
  status = 200
  force = true
