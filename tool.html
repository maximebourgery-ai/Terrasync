<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chargement...</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0a0a12;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .loader{text-align:center;padding:40px}
  .spinner{width:44px;height:44px;border:3px solid rgba(0,212,100,.2);border-top-color:#00d464;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:8px}
  .sub{font-size:11px;color:rgba(255,255,255,.25)}
  .err{background:#1a0a0a;border:1px solid #c0392b;border-radius:12px;padding:24px 32px;text-align:center;max-width:420px}
  .err h2{color:#e74c3c;margin-bottom:10px;font-size:16px}
  .err p{color:rgba(255,255,255,.5);font-size:13px;line-height:1.6}
  .err button{margin-top:16px;background:#00d464;border:none;color:#0a0a08;border-radius:7px;padding:9px 22px;font-weight:700;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="msg" id="msg">Chargement de l'outil...</div>
  <div class="sub" id="sub"></div>
</div>

<script>
(async function(){
  const p = new URLSearchParams(location.search);
  const binId = p.get('bin');
  const toolId = p.get('tid');

  function setMsg(m, s){ document.getElementById('msg').textContent=m; if(s)document.getElementById('sub').textContent=s; }
  function showError(title, detail){
    document.getElementById('loader').innerHTML =
      '<div class="err"><h2>'+title+'</h2><p>'+detail+'</p><button onclick="history.back()">← Retour</button></div>';
  }

  if(!binId || !toolId){ showError('Paramètres manquants','Lien invalide — relancez l\'outil depuis votre espace.'); return; }

  try {
    setMsg('Connexion au cloud...', binId.slice(0,8)+'...');
    const resp = await fetch('/.netlify/functions/anthropic', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({_jb:true, method:'GET', path:'/v3/b/'+binId+'/latest', headers:{'X-Bin-Meta':'false'}})
    });

    if(!resp.ok) throw new Error('Erreur réseau: '+resp.status);
    const data = await resp.json();
    if(data.error) throw new Error(data.error);

    const tools = data.tools || [];
    const tool = tools.find(function(t){ return t.id === toolId; });

    if(!tool){ showError('Outil introuvable','Cet outil n\'existe plus ou n\'a pas été déployé.'); return; }
    if(!tool.htmlContent || tool.htmlContent.length < 50){ showError('Outil vide','Aucun fichier HTML associé à cet outil.'); return; }

    setMsg('Lancement de '+tool.name+'...');

    // Injecter le titre
    let html = tool.htmlContent;
    if(html.includes('<title>') && !html.includes(tool.name)){
      html = html.replace(/<title>.*?<\/title>/, '<title>'+tool.name+'</title>');
    } else if(!html.includes('<title>')){
      html = html.replace('<head>', '<head><title>'+tool.name+'</title>');
    }

    // Injecter le proxy URL pour les outils qui l'utilisent
    const proxyScript = '<script>window.PROXY_URL="/.netlify/functions/anthropic";<\/script>';
    html = html.includes('<head>') ? html.replace('<head>', '<head>'+proxyScript) : proxyScript+html;

    // Injecter dans un blob URL — propre, cross-browser, aucun sandbox
    var blob = new Blob([html], {type: 'text/html; charset=utf-8'});
    var blobUrl = URL.createObjectURL(blob);
    // Remplacer la page courante par le blob URL
    window.location.replace(blobUrl);

  } catch(err){
    showError('Erreur de chargement', err.message || 'Problème inconnu. Vérifiez votre connexion.');
  }
})();
</script>
</body>
</html>
